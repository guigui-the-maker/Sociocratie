<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Timer Sociocratique - OS 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">

    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --bg: #f1f5f9;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #1e293b;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        nav { margin-bottom: 20px; }
        nav a { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
        nav a:hover { color: #4f46e5; }

        h1 {
            text-align: center;
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 30px;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Controls Panel */
        .panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }

        .time-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        input, select {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        button {
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); background: #4f46e5; }
        
        .btn-outline { background: white; color: #64748b; border: 1px solid #cbd5e1; }
        .btn-outline:hover { background: #f8fafc; color: var(--text); }

        #applyBtn { background: var(--success); color: white; display: none; }

        /* Participants Grid */
        .participants {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
        }

        .speaker {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
            z-index: 10;
        }

        .delete-mode { border: 2px dashed var(--danger); }
        .delete-mode::before { content: "✕"; position: absolute; top: 10px; right: 10px; color: var(--danger); font-weight: bold; }

        .name { font-size: 1.2rem; font-weight: 800; color: #1e293b; margin-bottom: 5px; }
        .timer { font-size: 2.5rem; font-weight: 800; margin: 10px 0; color: #334155; font-variant-numeric: tabular-nums; }

        .warning { color: var(--warning); }
        .danger { color: var(--danger); animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; }
        }

        /* Progress Bar */
        .progress {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }

        .bar { height: 100%; background: var(--primary); transition: width 0.3s linear, background 0.3s ease; }
        .bar.orange { background: var(--warning); }
        .bar.red { background: var(--danger); }

        .bottom-controls {
            background: var(--glass);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            position: sticky;
            bottom: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }

        .btn-talk { width: 100%; margin: 15px 0 5px; }
        .speaker .btn-talk { background: var(--danger); }

    </style>
</head>

<body>

<div class="container">
    <nav><a href="index.html">← Retour au Portail</a></nav>

    <h1>Temps de Parole</h1>

    <div class="panel">
        <div class="time-controls">
            <label style="font-weight: 600; color: #64748b;">TEMPS LIMITE :</label>
            <input id="minInput" type="number" value="2" min="0" style="width:70px">
            <span style="font-weight: bold;">:</span>
            <input id="secInput" type="number" value="0" min="0" max="59" style="width:70px">
            
            <button id="applyBtn" onclick="updateLimit()">Appliquer</button>
            <button class="btn-outline" onclick="resetAll()">Réinitialiser</button>
        </div>
    </div>

    <div class="participants" id="participants"></div>

    <div class="bottom-controls">
        <input id="nameInput" placeholder="Nom du participant" style="flex: 1; min-width: 200px;">
        <button class="btn-primary" onclick="addParticipant()">➕ Ajouter</button>
        <button class="btn-outline" onclick="activateDeleteMode()" style="color: var(--danger);">🗑️ Supprimer</button>
    </div>
</div>

<script>
let participants = [];
let limit = 120;
let deleteMode = false;

function save() {
    localStorage.setItem("sociocracy_timer_2026", JSON.stringify({participants, limit}));
}

function load() {
    let data = localStorage.getItem("sociocracy_timer_2026");
    if(data) {
        let parsed = JSON.parse(data);
        participants = parsed.participants || [];
        limit = parsed.limit || 120;
        document.getElementById("minInput").value = Math.floor(limit / 60);
        document.getElementById("secInput").value = limit % 60;
    }
}

function showApply() {
    document.getElementById("applyBtn").style.display = "inline-block";
}

document.getElementById("minInput").addEventListener("input", showApply);
document.getElementById("secInput").addEventListener("input", showApply);

function formatTime(s) {
    let m = Math.floor(s / 60);
    let sec = s % 60;
    return m + ":" + (sec < 10 ? "0" : "") + sec;
}

function addParticipant() {
    let name = document.getElementById("nameInput").value.trim();
    if(!name) return;
    participants.push({ name, time: 0, running: false });
    document.getElementById("nameInput").value = "";
    save();
    render();
}

function updateLimit() {
    let min = parseInt(document.getElementById("minInput").value) || 0;
    let sec = parseInt(document.getElementById("secInput").value) || 0;
    limit = min * 60 + sec;
    document.getElementById("applyBtn").style.display = "none";
    save();
    render();
}

function toggle(index) {
    if(deleteMode) {
        confirmDelete(index);
        return;
    }

    let p = participants[index];

    if(p.running) {
        p.running = false;
        clearInterval(p.interval);
    } else {
        // Arrêter tous les autres participants
        participants.forEach((o, i) => {
            o.running = false;
            clearInterval(o.interval);
        });

        p.running = true;
        p.interval = setInterval(() => {
            p.time++;
            updateUI(index);
            save();
        }, 1000);
    }
    render();
}

function updateUI(index) {
    let p = participants[index];
    let percent = (p.time / limit) * 100;
    let timerEl = document.getElementById("timer_" + index);
    let barEl = document.getElementById("bar_" + index);

    if(!timerEl || !barEl) return;

    timerEl.innerText = formatTime(p.time);
    barEl.style.width = Math.min(percent, 100) + "%";

    timerEl.classList.remove("warning", "danger");
    barEl.classList.remove("orange", "red");

    if(percent >= 100) {
        timerEl.classList.add("danger");
        barEl.classList.add("red");
        if(p.time % 5 === 0) beep(); // Bip toutes les 5s après dépassement
    } else if(percent >= 90) {
        timerEl.classList.add("warning");
        barEl.classList.add("orange");
    }
}

function beep() {
    try {
        const ctx = new(window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 600;
        gain.gain.value = 0.1;
        osc.start();
        setTimeout(() => osc.stop(), 150);
    } catch(e) {}
}

function resetAll() {
    if(!confirm("Réinitialiser tous les chronomètres ?")) return;
    participants.forEach(p => {
        p.time = 0;
        p.running = false;
        clearInterval(p.interval);
    });
    save();
    render();
}

function activateDeleteMode() {
    deleteMode = !deleteMode;
    render();
}

function confirmDelete(index) {
    if(confirm("Supprimer " + participants[index].name + " ?")) {
        clearInterval(participants[index].interval);
        participants.splice(index, 1);
        save();
    }
    deleteMode = false;
    render();
}

function render() {
    let container = document.getElementById("participants");
    container.innerHTML = "";

    participants.forEach((p, i) => {
        let percent = (p.time / limit) * 100;
        let card = document.createElement("div");
        card.className = "card" + (p.running ? " speaker" : "") + (deleteMode ? " delete-mode" : "");
        
        card.onclick = () => toggle(i);

        card.innerHTML = `
            <div class="name">${p.name}</div>
            <div class="timer ${percent >= 100 ? 'danger' : (percent >= 90 ? 'warning' : '')}" id="timer_${i}">
                ${formatTime(p.time)}
            </div>
            <button class="btn-primary btn-talk">
                ${p.running ? "⏸️ PAUSE" : "🎤 PARLER"}
            </button>
            <div class="progress">
                <div class="bar ${percent >= 100 ? 'red' : (percent >= 90 ? 'orange' : '')}" 
                     id="bar_${i}" style="width:${Math.min(percent, 100)}%"></div>
            </div>
        `;
        container.appendChild(card);
    });
}

load();
render();
</script>

</body>
</html>
